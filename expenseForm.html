<!DOCTYPE html>
<html>
  <body>
    <label>Amount:</label><br>
    <input type="text" id="amount"><br><br>


    <label>Income Category:</label><br>
    <select id="expense_category">
      <option value="Allowance">Food and Drinks</option>
      <option value="Side Hustle">Gift</option>
      <option value="Gift">Payables</option>
      <option value="Bonus">Car Maintenance</option>
      <option value="Balance Adjustment">Balance Adjustment</option>
    </select><br><br>

    <label>Account:</label><br>
    <select id="account">
      <option value="Maya (Emergency Fund)">Maya (Emergency Fund)</option>
      <option value="Maya (Time Deposit)">Maya (Time Deposit)</option>
      <option value="Cash on Hand">Cash on Hand</option>
      <option value="Tithes">Tithes</option>
      <option value="FirstMetroSec">FirstMetroSec</option>
      <option value="Metrobank">Metrobank</option>
      <option value="Maribank (GF Fund)">Maribank (GF Fund)</option>
      <option value="Maribank (Gold Investment)">Maribank (Gold Investment)</option>
      <option value="GoTyme (Expense Fund)">GoTyme (Expense Fund)</option>
      <option value="Atome (Debt Fund)">Atome (Debt Fund)</option>
    </select><br><br>
    <button onclick="submit()">Submit</button>

    <script>
      function submit() {
        const amount = document.getElementById("amount").value;
        const expense_category = document.getElementById("expense_category").value;
        const account = document.getElementById("account").value;

        google.script.run
          .withSuccessHandler(() => google.script.host.close())
          .submitExpense(amount, expense_category, account);
      }
    </script>
  </body>
</html>
